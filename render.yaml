services:
  - type: web
    name: hrm-api
    runtime: node
    region: singapore
    plan: free
    rootDir: .
    buildCommand: npx --yes pnpm@11.5.2 install --no-frozen-lockfile --ignore-scripts && npx --yes pnpm@11.5.2 --filter @workspace/api-server build
    startCommand: node artifacts/api-server/dist/index.mjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false        # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
