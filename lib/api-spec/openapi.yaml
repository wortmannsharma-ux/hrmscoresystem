          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  # ── OFFICE LOCATIONS (Geo-Fencing) ────────────────────
  /office-locations:
    get:
      operationId: listOfficeLocations
      tags: [attendance]
      responses:
        "200":
          description: Office locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OfficeLocation"
    post:
      operationId: createOfficeLocation
      tags: [attendance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfficeLocationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfficeLocation"

  /office-locations/{id}:
    patch:
      operationId: updateOfficeLocation
      tags: [attendance]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OfficeLocationInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OfficeLocation"
    delete:
      operationId: deleteOfficeLocation
      tags: [attendance]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

  # ── HOLIDAYS ──────────────────────────────────────────
  /holidays:
    get:
      operationId: listHolidays
      tags: [leaves]
      parameters:
        - name: year
          in: query
          schema: { type: ["integer", "null"] }
      responses:
        "200":
          description: Holidays
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Holiday"
    post:
      operationId: createHoliday
      tags: [leaves]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HolidayInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Holiday"

  /holidays/{id}:
    delete:
      operationId: deleteHoliday
      tags: [leaves]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted

