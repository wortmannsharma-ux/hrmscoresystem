    PendingApprovals:
      type: object
      required: [leaves, expenses, attendance, visits]
      properties:
        leaves: { type: integer }
        expenses: { type: integer }
        attendance: { type: integer }
        visits: { type: integer }
        total: { type: integer }

    ActivityItem:
      type: object
      required: [id, type, message, timestamp]
      properties:
        id: { type: integer }
        type: { type: string }
        message: { type: string }
        employeeId: { type: ["integer", "null"] }
        employeeName: { type: ["string", "null"] }
        timestamp: { type: string }

    DepartmentCount:
      type: object
      required: [departmentId, departmentName, count]
      properties:
        departmentId: { type: integer }
        departmentName: { type: string }
        count: { type: integer }

    AttendanceTrendItem:
      type: object
      required: [date, present, absent, late]
      properties:
        date: { type: string }
        present: { type: integer }
        absent: { type: integer }
        late: { type: integer }

    # ── NOTIFICATION ──────────────────────────────────
    Notification:
      type: object
      required: [id, employeeId, type, message, isRead, createdAt]
      properties:
        id: { type: integer }
        employeeId: { type: integer }
        type: { type: string }
        message: { type: string }
        isRead: { type: boolean }
        relatedId: { type: ["integer", "null"] }
        createdAt: { type: string }

    # ── APPROVAL ──────────────────────────────────────
    ApprovalInput:
      type: object
      required: [action]
      properties:
        action: { type: string }
        remarks: { type: ["string", "null"] }
        approvedBy: { type: ["integer", "null"] }

    # ── OFFICE LOCATION ───────────────────────────────
    OfficeLocation:
      type: object
      required: [id, name, lat, lng, radius]
      properties:
        id: { type: integer }
        name: { type: string }
        lat: { type: number }
        lng: { type: number }
        radius: { type: integer }
        requireApproval: { type: boolean }
        isActive: { type: boolean }
        createdAt: { type: string }

    OfficeLocationInput:
      type: object
      required: [name, lat, lng, radius]
      properties:
        name: { type: string }
        lat: { type: number }
        lng: { type: number }
        radius: { type: integer }
        requireApproval: { type: ["boolean", "null"] }
        isActive: { type: ["boolean", "null"] }

    # ── HOLIDAY ───────────────────────────────────────
    Holiday:
      type: object
      required: [id, name, date, type]
      properties:
        id: { type: integer }
        name: { type: string }
        date: { type: string }
        type: { type: string }
        isOptional: { type: boolean }
        createdAt: { type: string }

    HolidayInput:
      type: object
      required: [name, date, type]
      properties:
        name: { type: string }
        date: { type: string }
        type: { type: string }
        isOptional: { type: ["boolean", "null"] }
